    <script>
      // Prevent FOUC by applying dark mode and locale before page render
      (function () {
        // Dark mode
        const storedTheme = localStorage.getItem("theme-preference");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (storedTheme === "dark" || (storedTheme !== "light" && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
        // Locale
        const storedLocale = localStorage.getItem("locale-preference");
        const browserLocale = navigator.language.split("-")[0];
        const locale = storedLocale || (browserLocale === "en" ? "en" : "ro");
        document.documentElement.lang = locale;
      })();
    </script>
