<!doctype html>
<html lang="ro">
  <head>
    <script>
      // Prevent FOUC by applying dark mode before page render
      (function () {
        const storedTheme = localStorage.getItem("theme-preference");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (storedTheme === "dark" || (storedTheme !== "light" && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="msapplication-TileColor" content="#e20076" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=1" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=1" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=1" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg?v=1" color="#e20076" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" />
    <link rel="manifest" href="/site.webmanifest?v=1" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
